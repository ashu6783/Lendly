# Render Blueprint — LMS (Docker)
# Deploy: Dashboard → New → Blueprint → connect repo → use this file.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: lms-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Set in Render Dashboard after lms-web deploys (avoids circular blueprint dependency)
      - key: CLIENT_URL
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: 5

  - type: web
    name: lms-web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    healthCheckPath: /
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: lms-api
          envVarKey: RENDER_EXTERNAL_URL
